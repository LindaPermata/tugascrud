<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Data KTP - Linda Permata Sari</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .table-container { background: white; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-4">
                <h4 class="text-center mb-4" id="formTitle">Tambah Data KTP</h4>
                <form id="ktpForm">
                    <input type="hidden" id="id">

                    <div class="mb-3">
                        <label class="form-label">Nomor KTP</label>
                        <input type="text" class="form-control" id="nomorKtp" placeholder="Masukkan 16 digit" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" id="namaLengkap" placeholder="Nama sesuai KTP" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Alamat</label>
                        <textarea class="form-control" id="alamat" rows="2" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tanggal Lahir</label>
                        <input type="date" class="form-control" id="tanggalLahir" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Jenis Kelamin</label>
                        <select id="jenisKelamin" class="form-select" required>
                            <option value="">-- Pilih --</option>
                            <option value="Laki-laki">Laki-laki</option>
                            <option value="Perempuan">Perempuan</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary" id="btnSimpan">Simpan Data</button>
                        <button type="button" class="btn btn-secondary" onclick="resetForm()">Batal</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="table-container shadow-sm">
                <h4 class="mb-4">Daftar Penduduk</h4>
                <div class="table-responsive">
                    <table class="table table-hover table-striped">
                        <thead class="table-dark">
                        <tr>
                            <th>No KTP</th>
                            <th>Nama</th>
                            <th>Alamat</th>
                            <th>Tgl Lahir</th>
                            <th>Gender</th>
                            <th>Aksi</th>
                        </tr>
                        </thead>
                        <tbody id="tableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "/api/ktp"; // Pastikan ini sama dengan @RequestMapping di Controller-mu

    $(document).ready(function() {
        loadData();
    });

    // 1. GET: Mengambil seluruh data
    function loadData() {
        $.ajax({
            url: API_URL,
            method: "GET",
            success: function(data) {
                let rows = "";
                data.forEach(function(item) {
                    rows += `
                    <tr>
                        <td><strong>${item.nomorKtp}</strong></td>
                        <td>${item.namaLengkap}</td>
                        <td>${item.alamat}</td>
                        <td>${item.tanggalLahir}</td>
                        <td><span class="badge ${item.jenisKelamin == 'Laki-laki' ? 'bg-info' : 'bg-warning text-dark'}">${item.jenisKelamin}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-success me-1" onclick="editData(${item.id})">Edit</button>
                            <button class="btn btn-sm btn-outline-danger" onclick="deleteData(${item.id})">Hapus</button>
                        </td>
                    </tr>`;
                });
                $("#tableBody").html(rows);
            }
        });
    }

    // 2. POST & PUT: Simpan atau Update
    $("#ktpForm").submit(function(e) {
        e.preventDefault();
        let id = $("#id").val();

        let data = {
            nomorKtp: $("#nomorKtp").val(),
            namaLengkap: $("#namaLengkap").val(),
            alamat: $("#alamat").val(),
            tanggalLahir: $("#tanggalLahir").val(),
            jenisKelamin: $("#jenisKelamin").val()
        };

        let method = (id === "") ? "POST" : "PUT";
        let url = (id === "") ? API_URL : API_URL + "/" + id;

        $.ajax({
            url: url,
            method: method,
            contentType: "application/json",
            data: JSON.stringify(data),
            success: function() {
                alert(id === "" ? "Data berhasil disimpan!" : "Data berhasil diperbarui!");
                resetForm();
                loadData();
            },
            error: function(err) {
                alert("Gagal menyimpan data! Cek apakah Nomor KTP duplikat.");
            }
        });
    });

    // 3. GET by ID: Untuk Edit
    function editData(id) {
        $.ajax({
            url: API_URL + "/" + id,
            method: "GET",
            success: function(data) {
                $("#id").val(data.id);
                $("#nomorKtp").val(data.nomorKtp);
                $("#namaLengkap").val(data.namaLengkap);
                $("#alamat").val(data.alamat);
                $("#tanggalLahir").val(data.tanggalLahir);
                $("#jenisKelamin").val(data.jenisKelamin);

                $("#formTitle").text("Edit Data KTP");
                $("#btnSimpan").removeClass("btn-primary").addClass("btn-success").text("Update Data");
            }
        });
    }

    // 4. DELETE: Hapus Data
    function deleteData(id) {
        if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
            $.ajax({
                url: API_URL + "/" + id,
                method: "DELETE",
                success: function() {
                    alert("Data berhasil dihapus!");
                    loadData();
                }
            });
        }
    }

    function resetForm() {
        $("#ktpForm")[0].reset();
        $("#id").val("");
        $("#formTitle").text("Tambah Data KTP");
        $("#btnSimpan").removeClass("btn-success").addClass("btn-primary").text("Simpan Data");
    }
</script>

</body>
</html>
